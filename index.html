const store = {

    if (typeof window !== "undefined" && window.storage && window.storage.get) {
      try { const r = await window.storage.get(k, false); return r ? r.value : null; } catch (e) { return null; }
    }
    try { return localStorage.getItem(k); } catch (e) { return null; }
  },
  async set(k, v) {
    if (typeof window !== "undefined" && window.storage && window.storage.set) {
      try { await window.storage.set(k, v, false); return; } catch (e) {}
    }
    try { localStorage.setItem(k, v); } catch (e) {}
  },
};

/* ---------- priority engine: shared urgency scoring across all 5 pillars ---------- */
const PRIORITY_LEVELS = ["Low", "Medium", "High"];
const PRIORITY_WEIGHT = { Low: 1, Medium: 2, High: 3 };
const PRIORITY_TINT = { Low: C.sky, Medium: C.amber, High: C.rose };

/* how hard the calendar alone pushes urgency up, independent of the priority you set */
function dueUrgency(daysUntilDue) {
  if (daysUntilDue === null) return 0;
  if (daysUntilDue < 0) return 3;
  if (daysUntilDue === 0) return 2.6;
  if (daysUntilDue <= 2) return 2.2;
  if (daysUntilDue <= 4) return 1.5;
  if (daysUntilDue <= 7) return 0.8;
  if (daysUntilDue <= 14) return 0.3;
  return 0;
}

/* how hard silence pushes urgency up: no logged progress, scaled to how much runway is left */
function stallUrgency(daysSinceProgress, daysUntilDue) {
  if (daysSinceProgress === null) return 0;
  const runway = daysUntilDue === null ? 14 : Math.max(daysUntilDue + daysSinceProgress, 1);
  const ratio = daysSinceProgress / runway;
  if (ratio >= 0.66) return 1.2;
  if (ratio >= 0.4) return 0.6;
  return 0;
}

/* score + bucket for one item shaped like { due, priority, lastProgress, created } */
function computeUrgency(item) {
  const base = PRIORITY_WEIGHT[item.priority] || PRIORITY_WEIGHT.Medium;
  const dUntil = item.due ? daysUntil(item.due) : null;
  const touch = item.lastProgress || item.created || null;
  const dSince = touch ? daysSince(touch) : null;
  const score = base + dueUrgency(dUntil) + stallUrgency(dSince, dUntil);
  const bucket = score >= 4.2 ? "Urgent" : score >= 2.2 ? "Medium" : "Low";
  return { score: Math.round(score * 10) / 10, bucket, daysUntilDue: dUntil, daysSinceProgress: dSince };
}

/* content doesn't get per-item due dates/priority — the whole pillar's urgency is one master
   signal: how many days overdue you are on your own posting cadence. Every day past the cadence
   window adds 25%, capping out (Urgent) by 4 days overdue. Every open content piece inherits this
   same score/bucket, so individual ideas never compete with each other on "urgency". */
function computeContentUrgency(content) {
  const since = daysSince(content.lastPosted);
  if (since === null) return { score: 2.5, bucket: "Medium", daysUntilDue: null, pctOverdue: 0 };
  const overdueDays = Math.max(0, since - content.cadence);
  const pctOverdue = Math.min(100, overdueDays * 25);
  const score = Math.round((1 + (pctOverdue / 100) * 5) * 10) / 10;
  const bucket = score >= 4.2 ? "Urgent" : score >= 2.2 ? "Medium" : "Low";
  const daysUntilDue = content.cadence - since; // negative once overdue, matches the "Xd / overdue" display used elsewhere
  return { score, bucket, daysUntilDue, pctOverdue };
}

/* pulls every outstanding item from all 5 pillars into one flat, scored list.
   unlocks pulls from two sources: Discovery ecosystem benefits currently "in progress",
   and the linear chain steps (apartment / car ownership) currently "active". */
function collectPriorityTasks(ally, mama) {
  const out = [];
  {
    const cu = computeContentUrgency(ally.content);
    ally.content.items.forEach((i) => out.push({
      id: i.id, pillar: "content", title: i.title, due: null, lastProgress: null, created: i.created || null,
      score: cu.score, bucket: cu.bucket, daysUntilDue: cu.daysUntilDue, daysSinceProgress: null, _preScored: true,
    }));
  }
  {
    const songCurrentIdx = ally.song.stages.findIndex((s) => s.status !== "done");
    if (songCurrentIdx !== -1) {
      const s = ally.song.stages[songCurrentIdx];
      out.push({
        id: s.id, pillar: "song", title: s.name, due: s.due || null,
        priority: s.priority || "Medium", lastProgress: s.lastProgress || null, created: s.created || null,
      });
    }
  }
  ((ally.unlocks.ecosystem && ally.unlocks.ecosystem.pillars) || []).flatMap((p) => p.benefits).filter((b) => b.state === "progress").forEach((b) => out.push({
    id: b.id, pillar: "unlocks", title: b.label, due: b.due || null,
    priority: b.priority || "Medium", lastProgress: b.lastProgress || null, created: b.created || null,
  }));
  (ally.unlocks.chains || []).forEach((ch) => ch.nodes.filter((n) => n.status === "active").forEach((n) => out.push({
    id: n.id, pillar: "unlocks", title: n.label, due: n.due || null,
    priority: n.priority || "Medium", lastProgress: n.lastProgress || null, created: n.created || null,
  })));
  ally.deals.deals.filter((d) => d.stage !== "Posted").forEach((d) => out.push({
    id: d.id, pillar: "deals", title: d.brand, due: d.due || null,
    priority: d.priority || "Medium", lastProgress: d.lastProgress || null, created: d.created || null,
  }));
  ally.deals.deals.forEach((d) => (d.tasks || []).filter((t) => !t.done).forEach((t) => out.push({
    id: t.id, pillar: "deals", title: `${t.title} (${d.brand})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  ally.deals.clients.forEach((c) => (c.tasks || []).filter((t) => !t.done).forEach((t) => out.push({
    id: t.id, pillar: "deals", title: `${t.title} (${c.name})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  mama.tasks.filter((t) => t.status !== "Done").forEach((t) => out.push({
    id: t.id, pillar: "mama", title: t.title, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  }));
  (mama.creators || []).forEach((cr) => (cr.tasks || []).filter((t) => !t.done).forEach((t) => out.push({
    id: t.id, pillar: "mama", title: `${t.title} (${cr.name})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  (mama.tools || []).forEach((tl) => (tl.tasks || []).filter((t) => !t.done).forEach((t) => out.push({
    id: t.id, pillar: "mama", title: `${t.title} (${tl.name})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  (mama.reports || []).forEach((rp) => (rp.tasks || []).filter((t) => !t.done).forEach((t) => out.push({
    id: t.id, pillar: "mama", title: `${t.title} (${rp.name || rp.title})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  return out.map((t) => (t._preScored ? t : { ...t, ...computeUrgency(t) }));
}

/* proposes each pillar's share of today's priority, steep on purpose so the busiest/most urgent pillar dominates.
   Always sums to exactly 100 so the pie is always fully filled, even with zero tasks anywhere.
   Content is special-cased: its urgency is one master signal (days overdue on posting cadence), not
   per-item, so its pillar weight must not inflate just because more ideas are sitting in the pipeline. */
function computePillarAllocation(byPillar) {
  const weight = (list, pillar) => (pillar === "content" && list.length > 0
    ? Math.pow(2, list[0].score)
    : list.reduce((s, t) => s + Math.pow(2, t.score), 0));
  const raw = PRIORITY_PILLARS.map((k) => ({ pillar: k, w: weight(byPillar[k], k) }));
  const totalW = raw.reduce((s, e) => s + e.w, 0);
  const rankOf = Object.fromEntries([...raw].sort((a, b) => b.w - a.w).map((e, i) => [e.pillar, i + 1]));
  const entries = totalW > 0
    ? raw.map((e) => ({ ...e, pct: Math.round((e.w / totalW) * 100) }))
    : raw.map((e) => ({ ...e, pct: 20 }));
  const drift = 100 - entries.reduce((s, e) => s + e.pct, 0);
  if (drift !== 0) {
    const biggestIdx = entries.reduce((bi, e, i, arr) => (e.w > arr[bi].w ? i : bi), 0);
    entries[biggestIdx] = { ...entries[biggestIdx], pct: entries[biggestIdx].pct + drift };
  }
  return { entries, rankOf };
}

/* ================= CHARTS ================= */
function Ring({ pct, tint, size = 66, thick = 8, label, sub }) {
  const r = (size - thick) / 2, c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label={label ? `${label} ${sub || ""}` : `${Math.round(pct * 100)} percent`} style={{ flexShrink: 0 }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(28,28,34,0.08)" strokeWidth={thick} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={tint} strokeWidth={thick} strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c * (1 - Math.min(1, pct))} transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset 0.6s ease" }} />
      {label !== undefined && <text x={size / 2} y={size / 2 + 1} textAnchor="middle" fill={C.ink} style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: size * 0.24, fontWeight: 700 }}>{label}</text>}
      {sub && <text x={size / 2} y={size / 2 + size * 0.2} textAnchor="middle" fill={MUT} style={{ fontSize: size * 0.11, letterSpacing: "0.06em" }}>{sub}</text>}
    </svg>
  );
}

function Donut({ segments, size = 150, thick = 20, centerTop, centerSub }) {
  const r = (size - thick) / 2, c = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  let off = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label="distribution donut chart">
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(28,28,34,0.06)" strokeWidth={thick} />
      {segments.map((seg, i) => {
        const frac = seg.value / total, dash = frac * c;
        const el = <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={seg.color} strokeWidth={thick}
          strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={-off} transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dasharray 0.5s ease" }} />;
        off += dash; return el;
      })}
      {centerTop !== undefined && <text x={size / 2} y={size / 2 - 2} textAnchor="middle" fill={C.ink} style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: size * 0.2, fontWeight: 700 }}>{centerTop}</text>}
      {centerSub && <text x={size / 2} y={size / 2 + size * 0.13} textAnchor="middle" fill={MUT} style={{ fontSize: size * 0.075, letterSpacing: "0.08em", textTransform: "uppercase" }}>{centerSub}</text>}
    </svg>
  );
}

function Bars({ data, height = 130 }) {
  const max = Math.max(...data.map((d) => d.value), 1);
  return (
    <div className="flex items-end justify-between gap-2" style={{ height }}>
      {data.map((d, i) => (
        <div key={i} className="flex flex-col items-center gap-1.5" style={{ flex: 1, height: "100%", justifyContent: "flex-end" }}>
          <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 13, fontWeight: 700, color: d.value ? C.ink : FAINT }}>{d.value}</span>
          <div style={{ width: "100%", maxWidth: 34, height: `${(d.value / max) * (height - 44)}px`, minHeight: 4, borderRadius: 8, background: d.color, transition: "height 0.5s ease" }} />
          <span style={{ fontSize: 10.5, color: MUT, textAlign: "center", lineHeight: 1.1 }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
}

function Bar({ pct, tint }) {
  return (
    <div style={{ height: 8, borderRadius: 99, background: "rgba(28,28,34,0.07)", overflow: "hidden" }}>
      <div style={{ height: "100%", width: `${Math.min(100, Math.round(pct * 100))}%`, borderRadius: 99, background: tint, transition: "width 0.5s ease" }} />
    </div>
  );
}

  useEffect(() => {
    (async () => {

      const ra = await store.get(ALLY_KEY); if (ra) { try { a = JSON.parse(ra); } catch (e) {} }
      const rm = await store.get(MAMA_KEY); if (rm) { try { m = JSON.parse(rm); } catch (e) {} }

      if (!a.unlocks) a.unlocks = ALLY_SEED.unlocks;
      if (!a.unlocks.ecosystem) a.unlocks.ecosystem = ALLY_SEED.unlocks.ecosystem;
      if (!a.unlocks.chains) a.unlocks.chains = ALLY_SEED.unlocks.chains;

        try { await store.set(key, JSON.stringify(data)); setSaveState("saved"); setTimeout(() => setSaveState("idle"), 1400); } catch (e) { setSaveState("error"); }
      }, 600);
      return () => clearTimeout(timers.current[key]);
    }, [data]);

  useSave(MAMA_KEY, mama);

  const go = (next) => { if (next === tab) return; setHistory((h) => [...h, tab].slice(-20)); setTab(next); setQ(""); };

            <div className="flex-1" />

/* ================= content health ================= */
function contentHealth(content) {
  const since = daysSince(content.lastPosted);
  const counts = Object.fromEntries(CONTENT_COLS.map((c) => [c, content.items.filter((i) => i.status === c).length]));
  const ready = counts.Edited;
  let tint = C.mint, msg = "On track. Keep the machine fed.";
  if (since === null) { tint = C.sky; msg = "Log when you last posted to start the runway clock."; }
  else if (since >= content.cadence && ready === 0) { tint = C.rose; msg = "Post overdue and nothing edited. Film or edit today."; }
  else if (since >= content.cadence) { tint = C.amber; msg = `Time to post. ${ready} edited and ready to go.`; }
  else if (ready === 0 && counts.Filmed === 0) { tint = C.amber; msg = "Downstream pipeline is empty. Script and film next."; }
  return { since, counts, ready, tint, msg };
}

/* ================= PRIORITY DASHBOARD ================= */
function PriorityDashboard({ ally, mama, go }) {
  const tasks = collectPriorityTasks(ally, mama);
  const byPillar = Object.fromEntries(PRIORITY_PILLARS.map((k) => [k, tasks.filter((t) => t.pillar === k)]));
  const { entries, rankOf } = computePillarAllocation(byPillar);
  const donutSegs = entries.map((e) => ({ value: e.pct, color: MODULES[e.pillar].accent }));
  const topEntry = [...entries].sort((a, b) => b.pct - a.pct)[0];
  const legend = [...entries].sort((a, b) => rankOf[a.pillar] - rankOf[b.pillar]);

  return (
    <section>
      <div style={{ marginBottom: 20 }}>
        <h1 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: "clamp(28px,4.5vw,38px)", margin: 0, letterSpacing: "-0.02em" }}>Priorities right now 🎯</h1>
        <p style={{ fontSize: 15, color: MUT, margin: "6px 0 0" }}>{tasks.length} open item{tasks.length === 1 ? "" : "s"} across all 5 pillars. The wedges are each pillar's share of priority right now, recalculated every time you open this.</p>
      </div>

      {/* hero: the pie is always 100% full, one wedge per pillar */}
      <div className="flex items-center justify-center gap-12 flex-wrap" style={{ ...card, borderRadius: 24, padding: "32px 36px", marginBottom: 22 }}>
        <Donut segments={donutSegs} size={230} thick={34} centerTop={`${MODULES[topEntry.pillar].emoji}`} centerSub={MODULES[topEntry.pillar].label} />
        <div className="flex flex-col gap-2.5">
          {legend.map((e) => (
            <button key={e.pillar} onClick={() => go(e.pillar)} className="flex items-center gap-3 text-left" style={{ background: "transparent", border: "none", cursor: "pointer", fontFamily: "inherit", padding: "3px 0" }}>
              <span style={{ width: 27, height: 27, borderRadius: 99, background: MODULES[e.pillar].accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13.5, fontWeight: 700, flexShrink: 0 }}>{rankOf[e.pillar]}</span>
              <span style={{ fontSize: 17 }}>{MODULES[e.pillar].emoji}</span>
              <span style={{ fontSize: 17, minWidth: 110 }}>{MODULES[e.pillar].label}</span>
              <b style={{ fontSize: 18 }}>{e.pct}%</b>
            </button>
          ))}

          k === "content"

            : <PriorityPillarCard key={k} pillarKey={k} tasks={byPillar[k]} go={go} rank={rankOf[k]} />
        ))}
      </div>
    </section>
  );

                  <div key={t.id} className="rounded-lg px-2 py-1.5" style={{ background: C.soft, border: `1px solid ${LINE}`, borderLeft: `2px solid ${PRIORITY_COL_TINT[col]}` }}>
                    <div style={{ fontSize: 12.5, lineHeight: 1.3 }}>{t.title}</div>
                    {t.daysUntilDue !== null && <div style={{ fontSize: 11, color: PRIORITY_COL_TINT[col], marginTop: 2 }}>{t.daysUntilDue < 0 ? `${-t.daysUntilDue}d overdue` : t.daysUntilDue === 0 ? "today" : `${t.daysUntilDue}d`}</div>}
                  </div>
                ))}
                {items.length === 0 && <div style={{ fontSize: 12, color: FAINT, padding: "4px 0" }}>—</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DueChip({ due, inline }) {
  const d = daysUntil(due);
  if (d === null) return null;
  const tint = d < 0 ? C.rose : d <= 2 ? C.amber : MUT;
  const text = d < 0 ? `overdue ${-d}d` : d === 0 ? "today" : `${d}d`;
  if (inline) return <span style={{ color: tint }}>{text}</span>;
  return <span style={{ fontSize: 10.5, color: tint, background: `${tint}1a`, border: `1px solid ${tint}44`, borderRadius: 99, padding: "2px 8px", flexShrink: 0 }}>{text}</span>;
}

/* shared control row: due date + priority (Low/Med/High) + log progress + live urgency readout.
   Used on every item across the 5 pillars so the Priorities dashboard can score them all the same way. */
function PriorityControls({ item, onChange, hideDue }) {
  const u = computeUrgency(item);
  const bucketTint = u.bucket === "Urgent" ? C.rose : u.bucket === "Medium" ? C.amber : MUT;
  const pr = item.priority || "Medium";
  return (
    <div className="flex items-center gap-1.5 flex-wrap mt-1.5" style={{ fontSize: 11 }}>
      {!hideDue && (
        <input type="date" value={item.due || ""} onChange={(e) => onChange({ due: e.target.value || null })}
          className="rounded-md" style={{ ...darkInput, fontSize: 10.5, padding: "3px 5px" }} aria-label="Due date" />
      )}
      <div className="flex gap-1">
        {PRIORITY_LEVELS.map((p) => (
          <button key={p} onClick={() => onChange({ priority: p })} className="rounded-full px-2 py-0.5"
            style={{ fontSize: 10, cursor: "pointer", fontFamily: "inherit",
              background: pr === p ? `${PRIORITY_TINT[p]}22` : FILL, border: `1px solid ${pr === p ? PRIORITY_TINT[p] : LINE}`,
              color: pr === p ? PRIORITY_TINT[p] : MUT }}>{p[0]}</button>
        ))}
      </div>
      <button onClick={() => onChange({ lastProgress: todayISO() })} className="flex items-center gap-1 rounded-full px-2 py-0.5"
        style={{ fontSize: 10, cursor: "pointer", fontFamily: "inherit", background: FILL, border: `1px solid ${LINE}`, color: MUT }}
        title="Log progress today"><Zap size={10} /> progress</button>
      <span style={{ marginLeft: "auto", color: bucketTint, fontWeight: 600, whiteSpace: "nowrap" }}>
        {u.bucket}{u.daysUntilDue !== null ? ` · ${u.daysUntilDue < 0 ? `${-u.daysUntilDue}d overdue` : u.daysUntilDue === 0 ? "today" : `${u.daysUntilDue}d`}` : ""}
      </span>
    </div>
  );
}

/* ================= CONTENT ================= */
/* skit script box: collapsed to a single line by default (so the board stays compact),
   auto-grows to fit whatever's pasted in once focused, and can be manually collapsed
   back down without losing the text underneath. */
function ScriptBox({ value, open, onFocus, onChange, onToggle }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (open) { ref.current.style.height = "auto"; ref.current.style.height = ref.current.scrollHeight + "px"; }
    else { ref.current.style.height = "28px"; }
  }, [value, open]);
  return (
    <div className="mt-1.5">
      <button onClick={onToggle} className="flex items-center gap-1" style={{ ...iconBtn, padding: 0, fontSize: 10, color: FAINT }}>
        {open ? <ChevronUp size={10} /> : <ChevronDown size={10} />}
        <span>{value ? "Script" : "Add script"}</span>
      </button>
      <textarea ref={ref} value={value} onFocus={onFocus} onChange={(e) => onChange(e.target.value)}
        placeholder="Paste the skit script here…" className="w-full rounded-lg px-2.5 py-1.5 mt-1"
        style={{ ...inputStyle, fontSize: 12.5, lineHeight: 1.5, resize: "none", overflow: "hidden", transition: "height 0.15s ease" }} />
    </div>
  );
}

function ContentModule({ data, setData, q }) {
  const content = data.content;
  const h = contentHealth(content);
  const [title, setTitle] = useState("");
  const [openDesc, setOpenDesc] = useState({});
  const toggleDesc = (id) => setOpenDesc((o) => ({ ...o, [id]: !o[id] }));
  const openIfNot = (id) => setOpenDesc((o) => (o[id] ? o : { ...o, [id]: true }));
  const patch = (p) => setData((d) => ({ ...d, content: { ...d.content, ...p } }));
  const ql = (q || "").toLowerCase();
  const add = () => { const t = title.trim(); if (!t) return; patch({ items: [{ id: uid(), title: t, desc: "", status: "Idea", created: todayISO() }, ...content.items] }); setTitle(""); };
  const move = (id, dir) => setData((d) => {
    const items = d.content.items.map((i) => { if (i.id !== id) return i; const next = CONTENT_COLS[Math.min(Math.max(CONTENT_COLS.indexOf(i.status) + dir, 0), CONTENT_COLS.length - 1)]; return { ...i, status: next }; });
    return { ...d, content: { ...d.content, items } };
  });
  const remove = (id) => patch({ items: content.items.filter((i) => i.id !== id) });
  const updateItem = (id, p) => patch({ items: content.items.map((i) => (i.id === id ? { ...i, ...p } : i)) });
  const markPosted = (id) => patch({ items: content.items.filter((i) => i.id !== id), lastPosted: todayISO() });
  const clearPosted = () => patch({ items: content.items.filter((i) => i.status !== "Posted") });
  const donutSegs = ["Idea", "Scripted", "Filmed", "Edited"].map((s) => ({ value: h.counts[s], color: CONTENT_TINT[s], label: s })).filter((s) => s.value > 0);
  const donutTotal = donutSegs.reduce((s, x) => s + x.value, 0);
  const cu = computeContentUrgency(content);
  const cuTint = cu.bucket === "Urgent" ? C.rose : cu.bucket === "Medium" ? C.amber : MUT;

  return (
    <section>
      <SectionHead title="Content engine" sub="Comedy pipeline. The runway tells you when to think, film, edit, and post." />

      {/* compact stat bar: since-post ring + message + inline legend, no separate donut card */}
      <div className="flex items-center gap-5 flex-wrap mb-4" style={{ ...card, borderRadius: 16, padding: "18px 22px" }}>
        <RingDark value={h.since === null ? 0 : Math.min(h.since, content.cadence)} max={content.cadence} label={h.since === null ? "—" : `${h.since}d`} tint={h.tint} size={74} />
        <div className="flex-1" style={{ minWidth: 220 }}>
          <div style={{ fontSize: 15, fontWeight: 500, color: h.tint }}>{h.msg}</div>
          <div className="flex items-center gap-2 mt-2 flex-wrap" style={{ fontSize: 12, color: MUT }}>
            last posted
            <input type="date" value={content.lastPosted || ""} onChange={(e) => patch({ lastPosted: e.target.value || null })} className="rounded-md" style={{ ...darkInput, fontSize: 12, padding: "4px 7px" }} />
            every
            <input type="number" min="1" max="14" value={content.cadence} onChange={(e) => patch({ cadence: Math.min(14, Math.max(1, Number(e.target.value) || 1)) })} className="rounded-md" style={{ ...darkInput, width: 42, fontSize: 12, padding: "4px 7px" }} />d
          </div>
          <div className="mt-2 flex items-center gap-1.5" style={{ fontSize: 11.5, color: MUT }}>
            <span className="rounded-full px-2 py-0.5" style={{ background: `${cuTint}22`, border: `1px solid ${cuTint}55`, color: cuTint, fontWeight: 700, fontSize: 10.5 }}>{cu.bucket}</span>
            pipeline urgency, +25% per day overdue on your posting cadence — every open idea shares this score, no individual deadlines needed
          </div>
        </div>
        {donutTotal > 0 && (
          <div className="flex items-center gap-4 flex-wrap" style={{ fontSize: 12.5, color: MUT }}>
            {donutSegs.map((s) => (
              <span key={s.label} className="flex items-center gap-1.5">
                <span style={{ width: 7, height: 7, borderRadius: 2, background: s.color }} />
                {s.label} <b style={{ color: C.ink, fontWeight: 600 }}>{s.value}</b>
              </span>
            ))}
          </div>
        )}
      </div>

      <div className="flex gap-2 flex-wrap mb-4" style={{ ...card, borderRadius: 12, padding: 12 }}>
        <input value={title} onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder="Drop a skit idea in the bank…" className="flex-1 rounded-lg px-3 py-2" style={{ ...inputStyle, minWidth: 200, fontSize: 13.5 }} />
        <button onClick={add} style={{ ...pillDark, fontSize: 13, padding: "8px 16px" }}><Plus size={13} style={{ display: "inline", marginRight: 4 }} />Add idea</button>
      </div>

      <div className="grid gap-0" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", background: LINE, gap: 1, border: `1px solid ${LINE}`, borderRadius: 14, overflow: "hidden" }}>
        {CONTENT_COLS.map((col) => {
          let cItems = content.items.filter((i) => i.status === col);
          if (ql) cItems = cItems.filter((i) => i.title.toLowerCase().includes(ql));
          return (
            <div key={col} style={{ background: C.canvas, padding: 16, display: "flex", flexDirection: "column", gap: 9 }}>
              <div className="flex items-center justify-between px-0.5" style={{ paddingBottom: 9, borderBottom: `1px solid ${LINE}`, marginBottom: 2 }}>
                <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 12.5, letterSpacing: "0.05em", textTransform: "uppercase", color: CONTENT_TINT[col] }}>{col}</span>
                <span style={{ fontSize: 12.5, color: MUT }}>{cItems.length}</span>
              </div>
              <div className="flex flex-col gap-2.5">
                {cItems.map((i) => (
                  <div key={i.id} className="rounded-lg" style={{ background: "rgba(255,255,255,0.035)", border: `1px solid ${LINE}`, borderLeft: `2px solid ${CONTENT_TINT[col]}`, borderRadius: 10, padding: "11px 13px" }}>
                    <InlineEdit value={i.title} onChange={(v) => updateItem(i.id, { title: v })} strong />
                    <ScriptBox value={i.desc || ""} open={!!openDesc[i.id]} onFocus={() => openIfNot(i.id)} onChange={(v) => updateItem(i.id, { desc: v })} onToggle={() => toggleDesc(i.id)} />
                    <div className="flex items-center gap-1 mt-1.5"><span className="ml-auto flex gap-1">
                      {col !== "Idea" && <button onClick={() => move(i.id, -1)} style={{ ...iconBtn, padding: 2 }} aria-label="Back">←</button>}
                      {col === "Edited"
                        ? <button onClick={() => markPosted(i.id)} className="rounded-full px-2.5 py-0.5" style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.03em", cursor: "pointer", fontFamily: "inherit", background: `${C.mint}22`, border: `1px solid ${C.mint}55`, color: C.mint }}>POSTED</button>
                        : <button onClick={() => move(i.id, 1)} style={{ ...iconBtn, padding: 2, color: C.mint }} aria-label="Forward">→</button>}
                      <button onClick={() => remove(i.id)} style={{ ...iconBtn, padding: 2 }} aria-label="Delete"><X size={11} /></button>
                    </span></div>
                  </div>
                ))}
                {cItems.length === 0 && <div className="rounded-lg text-center" style={{ border: `1px dashed ${LINE}`, fontSize: 12, color: FAINT, borderRadius: 10, padding: "14px 6px" }}>{ql ? "No match" : "Empty"}</div>}
              </div>
            </div>
          );
        })}
      </div>
      {content.items.some((i) => i.status === "Posted") && <button onClick={clearPosted} className="mt-3" style={{ ...iconBtn, fontSize: 11.5 }}>Clear posted archive</button>}
    </section>
  );
}

function RingDark({ value, max, label, tint, size = 100 }) {
  const r = (size - 9) / 2, c = 2 * Math.PI * r, pct = max ? Math.min(1, value / max) : 0;
  return (
    <div className="flex flex-col items-center" style={{ flexShrink: 0, gap: 3 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label={`${label} since post`} style={{ position: "relative" }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="9" />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={tint} strokeWidth="9" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - pct)} transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset 0.6s ease" }} />
        <text x={size / 2} y={size / 2 + size * 0.08} textAnchor="middle" fill="#fff" style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: size * 0.26, fontWeight: 700 }}>{label}</text>
      </svg>
      <span style={{ fontSize: 9, letterSpacing: "0.06em", color: "rgba(255,255,255,0.55)", whiteSpace: "nowrap" }}>SINCE POST</span>
    </div>
  );
}

/* ================= SONG ================= */
function SongModule({ data, setData }) {
  const song = data.song;
  const patch = (p) => setData((d) => ({ ...d, song: { ...d.song, ...p } }));
  const updateStage = (id, p) => patch({ stages: song.stages.map((s) => (s.id === id ? { ...s, ...p } : s)) });
  const updateGear = (id, p) => patch({ gear: song.gear.map((g) => (g.id === id ? { ...g, ...p } : g)) });
  const addGear = () => patch({ gear: [...song.gear, { id: uid(), name: "New item", price: 0, bought: false }] });
  const removeGear = (id) => patch({ gear: song.gear.filter((g) => g.id !== id) });
  const done = song.stages.filter((s) => s.status === "done").length;
  const gearTotal = song.gear.reduce((s, g) => s + (Number(g.price) || 0), 0);
  const gearSpent = song.gear.filter((g) => g.bought).reduce((s, g) => s + (Number(g.price) || 0), 0);

  /* the "current" stage is derived — the first not-done stage in order — never stored.
     that way it can never get stuck: toggle any stage's checkbox to mark it done (which
     unlocks the next one) or undo it, and the current step always recalculates from that. */
  const currentIdx = song.stages.findIndex((s) => s.status !== "done");
  const toggleStage = (i) => {
    const wasDone = song.stages[i].status === "done";
    patch({ stages: song.stages.map((st, j) => (j === i ? { ...st, status: wasDone ? "todo" : "done", lastProgress: wasDone ? st.lastProgress : todayISO() } : st)) });
  };

  return (
    <section>
      <SectionHead title="Get a song out" sub="One roadmap from sing test to release. Only the stage you're on right now carries a deadline — finish it to unlock the next." />
      <div className="rounded-2xl mb-6 flex items-center gap-4" style={{ ...card, borderRadius: 16, padding: 16, background: `linear-gradient(135deg, ${C.lilacBg}, ${C.card})`, border: `1px solid ${C.lilac}33` }}>
        <Ring pct={done / song.stages.length} tint={C.lilac} size={58} thick={7} label={`${done}`} />
        <div className="flex-1"><div style={{ fontSize: 13, color: MUT, marginBottom: 6 }}>{done} of {song.stages.length} stages done</div><Bar pct={done / song.stages.length} tint={C.lilac} /></div>
      </div>
      <div className="flex flex-col">
        {song.stages.map((s, i) => {
          const isDone = s.status === "done", isCurrent = !isDone && i === currentIdx, isLocked = !isDone && !isCurrent;
          const tint = isDone ? C.mint : isCurrent ? AURAS[i % AURAS.length] : FAINT;
          return (
          <div key={s.id} className="flex gap-4" style={{ opacity: isLocked ? 0.7 : 1 }}>
            <div className="flex flex-col items-center" style={{ width: 36, flexShrink: 0 }}>
              <button onClick={() => toggleStage(i)} aria-label={isDone ? "Mark not done" : "Mark done"} title={isLocked ? "Out of order — click to mark done anyway and skip ahead" : isDone ? "Mark not done" : "Mark done"}
                style={{ width: 34, height: 34, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", background: isDone ? C.mint : isCurrent ? `${tint}22` : C.card, border: `1px solid ${isDone ? C.mint : isCurrent ? tint : LINE}`, fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 13, fontWeight: 600, color: isDone ? "#fff" : isCurrent ? tint : MUT }}>
                {isDone ? <Check size={16} strokeWidth={3} /> : isLocked ? <Lock size={14} /> : i + 1}
              </button>
              {i < song.stages.length - 1 && <div style={{ width: 2, flex: 1, minHeight: 22, background: isDone ? `${C.mint}66` : LINE }} />}
            </div>
            <div className="rounded-2xl p-4 mb-4 flex-1" style={{ ...card, borderRadius: 16, borderLeft: `3px solid ${tint}`, background: isCurrent ? `${tint}0d` : card.background }}>
              <div className="flex items-center gap-2 flex-wrap">
                <div className="flex-1" style={{ minWidth: 140, textDecoration: isDone ? "line-through" : "none" }}><InlineEdit value={s.name} onChange={(v) => updateStage(s.id, { name: v })} strong /></div>
                <span className="rounded-full px-3 py-1" style={{ fontSize: 11, fontWeight: 600, background: `${tint}1e`, border: `1px solid ${tint}55`, color: tint }}>{isDone ? "Done" : isCurrent ? "Current" : "Locked"}</span>
              </div>
              <div style={{ fontSize: 12.5, color: MUT, margin: "4px 0 6px" }}>{s.desc}</div>
              {s.kind === "gear" && (
                <div className="rounded-xl p-3 my-2" style={{ ...cardSoft, borderRadius: 12 }}>
                  {song.gear.map((g) => (
                    <div key={g.id} className="flex items-center gap-2 py-1 flex-wrap">
                      <button onClick={() => updateGear(g.id, { bought: !g.bought })} aria-label="Toggle bought" style={{ width: 22, height: 22, borderRadius: 7, cursor: "pointer", flexShrink: 0, background: g.bought ? C.mint : C.card, border: `1px solid ${g.bought ? C.mint : LINE}`, display: "flex", alignItems: "center", justifyContent: "center" }}>{g.bought && <Check size={13} color="#fff" strokeWidth={3} />}</button>
                      <div className="flex-1" style={{ minWidth: 130, textDecoration: g.bought ? "line-through" : "none", opacity: g.bought ? 0.55 : 1 }}><InlineEdit value={g.name} onChange={(v) => updateGear(g.id, { name: v })} /></div>
                      <span style={{ fontSize: 12, color: MUT }}>R</span>
                      <input type="number" min="0" value={g.price || ""} placeholder="0" onChange={(e) => updateGear(g.id, { price: Number(e.target.value) || 0 })} className="rounded-lg px-2 py-1" style={{ ...inputStyle, width: 86, fontSize: 12 }} />
                      <button onClick={() => removeGear(g.id)} style={iconBtn} aria-label="Remove"><X size={12} /></button>
                    </div>
                  ))}
                  <div className="flex items-center justify-between mt-2 flex-wrap gap-2">
                    <button onClick={addGear} className="flex items-center gap-1" style={{ ...iconBtn, color: C.lilac, fontSize: 12 }}><Plus size={12} /> Add item</button>
                    <span style={{ fontSize: 12, color: MUT }}>Spent <b style={{ color: C.mint }}>{fmtR(gearSpent)}</b> of {fmtR(gearTotal)}</span>
                  </div>
                </div>
              )}
              {s.kind === "mix" && (
                <div className="flex gap-2 my-2 flex-wrap">{MIX_ROUTES.map((r) => (
                  <button key={r} onClick={() => patch({ mixRoute: song.mixRoute === r ? "" : r })} className="rounded-full px-3 py-1.5" style={{ fontSize: 12, cursor: "pointer", fontFamily: "inherit", background: song.mixRoute === r ? `${C.coral}22` : FILL, border: `1px solid ${song.mixRoute === r ? C.coral : LINE}`, color: song.mixRoute === r ? C.coral : MUT }}>{r}{song.mixRoute === r ? " ✓" : ""}</button>
                ))}</div>
              )}
              <InlineEdit value={s.note} onChange={(v) => updateStage(s.id, { note: v })} placeholder="Notes…" dim />
              {isCurrent && <PriorityControls item={s} onChange={(p) => updateStage(s.id, p)} />}
            </div>
          </div>
        ); })}
      </div>
    </section>
  );
}

/* ================= UNLOCKS (Discovery ecosystem) ================= */
const ECO_STATE = {
  live:     { label: "Live",        tint: C.mint,   dot: C.mint },
  progress: { label: "In progress", tint: C.yellow, dot: C.yellow },
  locked:   { label: "Locked",      tint: FAINT,    dot: FAINT },
  parked:   { label: "Parked",      tint: C.sky,    dot: C.sky },
};
const ECO_CYCLE = { locked: "progress", progress: "live", live: "parked", parked: "locked" };

function UnlocksModule({ data, setData }) {
  const eco = data.unlocks.ecosystem || { pillars: [], keystoneNote: "" };

  const patchBenefit = (pid, bid, p) => setData((d) => ({ ...d, unlocks: { ...d.unlocks, ecosystem: { ...d.unlocks.ecosystem, pillars: d.unlocks.ecosystem.pillars.map((pl) => pl.id === pid ? { ...pl, benefits: pl.benefits.map((b) => b.id === bid ? { ...b, ...p } : b) } : pl) } } }));
  const addBenefit = (pid) => setData((d) => ({ ...d, unlocks: { ...d.unlocks, ecosystem: { ...d.unlocks.ecosystem, pillars: d.unlocks.ecosystem.pillars.map((pl) => pl.id === pid ? { ...pl, benefits: [...pl.benefits, { id: uid(), label: "New benefit", state: "locked", note: "", due: null, priority: "Medium", lastProgress: null, created: todayISO() }] } : pl) } } }));
  const removeBenefit = (pid, bid) => setData((d) => ({ ...d, unlocks: { ...d.unlocks, ecosystem: { ...d.unlocks.ecosystem, pillars: d.unlocks.ecosystem.pillars.map((pl) => pl.id === pid ? { ...pl, benefits: pl.benefits.filter((b) => b.id !== bid) } : pl) } } }));

  /* chains (apartment gating + car ownership) */
  const updateNode = (cid, nid, p) => setData((d) => ({ ...d, unlocks: { ...d.unlocks, chains: d.unlocks.chains.map((c) => c.id === cid ? { ...c, nodes: c.nodes.map((n) => (n.id === nid ? { ...n, ...p } : n)) } : c) } }));
  const cycle = { locked: "active", active: "done", done: "locked" };

  const allB = eco.pillars.flatMap((p) => p.benefits);
  const liveN = allB.filter((b) => b.state === "live").length;

  return (
    <section>
      <SectionHead title="Discovery ecosystem" sub="Not a checklist, a loop. Each pillar feeds Vitality status; status feeds cashback rates; engagement feeds status. Tap a state dot to cycle it." />

      {/* keystone banner */}
      <div className="rounded-2xl p-4 mb-4" style={{ ...cardSoft, borderRadius: 16, borderLeft: `3px solid ${C.lilac}` }}>
        <div className="flex items-center gap-2 mb-1"><span style={{ fontSize: 14 }}>🗝️</span><span style={{ fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", color: C.lilac, fontWeight: 600 }}>Keystone</span></div>
        <p style={{ fontSize: 13, color: MUT, margin: 0, lineHeight: 1.5 }}>{eco.keystoneNote}</p>
      </div>

      {/* pillars */}
      <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))" }}>
        {eco.pillars.map((pl) => {
          const live = pl.benefits.filter((b) => b.state === "live").length;
          return (
            <div key={pl.id} className="rounded-2xl p-4" style={{ ...card, borderRadius: 18, borderTop: `2px solid ${pl.accent}` }}>

/* ================= APARTMENT ================= */
function ApartmentModule({ data, setData, unlocked, go, q }) {
  const items = data.apartment.items;
  const ql = (q || "").toLowerCase();
  const patch = (p) => setData((d) => ({ ...d, apartment: { ...d.apartment, ...p } }));
  const update = (id, p) => patch({ items: items.map((i) => (i.id === id ? { ...i, ...p } : i)) });
  const add = () => patch({ items: [...items, { id: uid(), name: "New item", source: "", budget: 0, status: "To source", paid: 0 }] });
  const remove = (id) => patch({ items: items.filter((i) => i.id !== id) });
  const ITEM_STATUSES = ["To source", "Watching", "Bought"], ST = { "To source": MUT, Watching: C.sky, Bought: C.mint };
  const cycleStatus = (s) => ITEM_STATUSES[(ITEM_STATUSES.indexOf(s) + 1) % ITEM_STATUSES.length];
  const budgetTotal = items.reduce((s, i) => s + (Number(i.budget) || 0), 0);
  const spent = items.filter((i) => i.status === "Bought").reduce((s, i) => s + (Number(i.paid) || 0), 0);
  const boughtCount = items.filter((i) => i.status === "Bought").length;
  const over = spent > budgetTotal;

  if (!unlocked) {
    const apt = data.unlocks.chains.find((ch) => /apartment/i.test(ch.name)) || data.unlocks.chains.find((ch) => ch.nodes.some((n) => /move\s*in/i.test(n.label)));
    const nodes = apt ? apt.nodes : [];
    const done = nodes.filter((n) => n.status === "done").length;
    return (
      <section>
        <SectionHead title="8 Kingsbury · furnishing" sub="Locked until you move in. It opens automatically when the Move-in step is done." />
        <div className="rounded-2xl p-8 text-center" style={{ ...card, borderRadius: 20, maxWidth: 560, margin: "0 auto" }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>🛋️🔒</div>
          <h3 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 600, fontSize: 19, margin: "0 0 6px" }}>Furnishing opens after move-in</h3>
          <p style={{ fontSize: 13.5, color: MUT, margin: "0 auto 16px", maxWidth: 380, lineHeight: 1.5 }}>The {fmtR(budgetTotal)} plan and all {items.length} items are ready. This unlocks the moment you tick Move in on the Apartment chain.</p>
          <div className="rounded-xl p-4 text-left" style={{ ...cardSoft, borderRadius: 14, maxWidth: 420, margin: "0 auto 16px" }}>
            <div className="flex items-center justify-between mb-2"><span style={{ fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", color: MUT }}>Apartment chain</span><span style={{ fontSize: 12, color: C.yellow }}>{done}/{nodes.length}</span></div>
            {nodes.map((n) => (
              <div key={n.id} className="flex items-center gap-2 py-1" style={{ fontSize: 13, opacity: n.status === "locked" ? 0.55 : 1 }}>
                {n.status === "done" ? <Check size={14} color={C.mint} strokeWidth={3} /> : n.status === "active" ? <Sparkles size={13} color={C.yellow} /> : <Lock size={12} color={FAINT} />}
                <span style={{ textDecoration: n.status === "done" ? "line-through" : "none", fontWeight: /move\s*in/i.test(n.label) ? 600 : 400 }}>{n.label}</span>
              </div>
            ))}
          </div>
          <div className="flex gap-2 justify-center flex-wrap">
            <button onClick={() => go("unlocks")} style={pillDark}>Open the Apartment chain</button>
            <button onClick={() => patch({ unlockedOverride: true })} style={pillGhost}>Open early anyway</button>
          </div>
        </div>
      </section>
    );
  }

  let shown = items;
  if (ql) shown = items.filter((i) => i.name.toLowerCase().includes(ql) || (i.source || "").toLowerCase().includes(ql));
  return (
    <section>
      <SectionHead title="8 Kingsbury · furnishing" sub="From your Apartment Budget note. Tap a status pill to cycle it, log the real price when you buy." action={<AddBtn onClick={add} label="Add item" />} />
      {data.apartment.unlockedOverride && (
        <div className="rounded-xl px-3 py-2 mb-4 flex items-center justify-between flex-wrap gap-2" style={{ background: `${C.amber}14`, border: `1px solid ${C.amber}44`, borderRadius: 12, fontSize: 12.5 }}>
          <span>Opened early. Normally gated until move-in.</span><button onClick={() => patch({ unlockedOverride: false })} style={{ ...iconBtn, fontSize: 12, color: C.amber }}>Re-lock</button>
        </div>
      )}
      <div className="rounded-2xl p-7 mb-7 flex items-center gap-7 flex-wrap" style={{ ...card, borderRadius: 20 }}>
        <Ring pct={budgetTotal ? spent / budgetTotal : 0} tint={over ? C.rose : C.mint} size={100} thick={12} label={`${Math.round((budgetTotal ? spent / budgetTotal : 0) * 100)}%`} />
        <div className="flex-1" style={{ minWidth: 240 }}>
          <div style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 32, fontWeight: 700, color: over ? C.rose : C.ink }}>{fmtR(spent)} <span style={{ fontSize: 15, color: MUT, fontWeight: 400 }}>of {fmtR(budgetTotal)} plan</span></div>
          <div style={{ fontSize: 14.5, color: C.mint, marginBottom: 8 }}>{boughtCount}/{items.length} items bought</div>
          <Bar pct={budgetTotal ? spent / budgetTotal : 0} tint={over ? C.rose : C.mint} />
          <div style={{ fontSize: 12.5, color: FAINT, marginTop: 10 }}>Tiers: budget ~R26k · medium R38-45k · high R55-65k</div>
        </div>
      </div>
      <div className="flex flex-col gap-3">
        {shown.map((i) => (
          <div key={i.id} className="rounded-2xl px-5 py-4 flex items-center gap-4 flex-wrap" style={{ ...card, borderRadius: 16, borderLeft: `3px solid ${ST[i.status]}` }}>
            <button onClick={() => update(i.id, { status: cycleStatus(i.status) })} className="rounded-full px-3.5 py-1.5" style={{ fontSize: 12.5, cursor: "pointer", fontFamily: "inherit", width: 108, flexShrink: 0, background: `${ST[i.status]}1a`, border: `1px solid ${ST[i.status]}55`, color: ST[i.status] }}>{i.status}</button>
            <div className="flex-1" style={{ minWidth: 220 }}><InlineEdit value={i.name} onChange={(v) => update(i.id, { name: v })} strong /><InlineEdit value={i.source} onChange={(v) => update(i.id, { source: v })} placeholder="Source…" dim /></div>
            <div style={{ fontSize: 12.5, color: MUT }}>budget<input type="number" min="0" value={i.budget || ""} placeholder="0" onChange={(e) => update(i.id, { budget: Number(e.target.value) || 0 })} className="rounded-lg px-2.5 py-1.5 ml-1.5" style={{ ...inputStyle, width: 96, fontSize: 13.5 }} /></div>
            <div style={{ fontSize: 12.5, color: i.status === "Bought" ? C.mint : MUT }}>paid<input type="number" min="0" value={i.paid || ""} placeholder="0" onChange={(e) => update(i.id, { paid: Number(e.target.value) || 0 })} className="rounded-lg px-2.5 py-1.5 ml-1.5" style={{ ...inputStyle, width: 96, fontSize: 13.5 }} /></div>
            <button onClick={() => remove(i.id)} style={iconBtn} aria-label="Delete"><Trash2 size={15} /></button>
          </div>
        ))}
        {shown.length === 0 && <Empty text={ql ? "No item matches your search." : "No items. Add what the apartment needs."} />}
      </div>
    </section>
  );
}

/* ================= DEALS ================= */
const CLIENT_TINT = { Lead: C.sky, Active: C.mint, Paused: MUT };
const DEAL_TYPE_TINT = { Active: C.mint, Prospect: C.amber };

/* shared mini task tracker: used under each brand deal and each client so granular
   action items ("reply to email", "send rate card"...) get their own due date + priority
   and feed straight into the Priorities dashboard via collectPriorityTasks. */
function MiniTaskList({ tasks, onChange }) {
  const [title, setTitle] = useState("");
  const list = tasks || [];
  const add = () => { const t = title.trim(); if (!t) return; onChange([{ id: uid(), title: t, due: null, priority: "Medium", lastProgress: null, done: false, created: todayISO() }, ...list]); setTitle(""); };
  const update = (id, p) => onChange(list.map((t) => (t.id === id ? { ...t, ...p } : t)));
  const remove = (id) => onChange(list.filter((t) => t.id !== id));
  return (
    <div className="flex flex-col gap-1.5">
      <div className="flex gap-1.5">
        <input value={title} onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder="Add a task (e.g. Reply to email)…" className="flex-1 rounded-lg px-2 py-1.5" style={{ ...inputStyle, fontSize: 12 }} />
        <button onClick={add} style={{ ...pillDark, fontSize: 11, padding: "5px 10px" }}><Plus size={11} style={{ display: "inline", marginRight: 3 }} />Add</button>
      </div>
      {list.length === 0 && <div style={{ fontSize: 11.5, color: FAINT }}>No tasks yet.</div>}
      {list.map((t) => (
        <div key={t.id} className="rounded-lg px-2.5 py-2" style={{ background: C.soft, border: `1px solid ${LINE}`, opacity: t.done ? 0.5 : 1 }}>
          <div className="flex items-center gap-2">
            <button onClick={() => update(t.id, { done: !t.done })} aria-label="Toggle done" style={{ width: 18, height: 18, borderRadius: 6, cursor: "pointer", flexShrink: 0, background: t.done ? C.mint : C.card, border: `1px solid ${t.done ? C.mint : LINE}`, display: "flex", alignItems: "center", justifyContent: "center" }}>{t.done && <Check size={11} color="#fff" strokeWidth={3} />}</button>
            <div className="flex-1 min-w-0" style={{ textDecoration: t.done ? "line-through" : "none" }}><InlineEdit value={t.title} onChange={(v) => update(t.id, { title: v })} /></div>
            <button onClick={() => remove(t.id)} style={{ ...iconBtn, padding: 2 }} aria-label="Delete"><X size={11} /></button>
          </div>
          {!t.done && <PriorityControls item={t} onChange={(p) => update(t.id, p)} />}
        </div>
      ))}
    </div>
  );
}

        <div className="flex-1" style={{ minWidth: 150 }}><InlineEdit value={x.brand} onChange={(v) => update(x.id, { brand: v })} strong /><InlineEdit value={x.deliverable} onChange={(v) => update(x.id, { deliverable: v })} placeholder="Deliverable (e.g. 1x Reel + story)" dim /></div>
        <button onClick={() => update(x.id, { type: isProspect ? "Active" : "Prospect" })} className="rounded-full px-2.5 py-1" style={{ fontSize: 10.5, cursor: "pointer", fontFamily: "inherit", background: `${typeTint}1a`, border: `1px solid ${typeTint}55`, color: typeTint, whiteSpace: "nowrap" }}>{isProspect ? "→ mark active" : "→ mark prospect"}</button>

        <button onClick={onToggleOpen} style={iconBtn} aria-label="Expand">{open ? <ChevronUp size={16} /> : <ChevronDown size={16} />}</button>
      </div>
      {!isProspect && (
        <div className="flex gap-1 mt-3 flex-wrap">{DEAL_STAGES.map((s, i) => (
          <button key={s} onClick={() => update(x.id, { stage: s })} className="rounded-full px-2.5 py-1" style={{ fontSize: 10.5, cursor: "pointer", fontFamily: "inherit", background: i < idx ? `${tint}14` : x.stage === s ? `${tint}2b` : FILL, border: `1px solid ${x.stage === s ? tint : i < idx ? `${tint}55` : LINE}`, color: x.stage === s ? tint : i < idx ? tint : MUT }}>{i < idx ? "✓ " : ""}{s}</button>
        ))}</div>

      {(isProspect || x.stage !== "Posted") && <PriorityControls item={x} onChange={(p) => update(x.id, p)} hideDue />}

          <div><Label text="Caption" /><AutoTextarea value={x.caption} onChange={(v) => update(x.id, { caption: v })} placeholder="Approved caption, hashtags, promo code…" /></div>
          <div><Label text="Posting instructions" /><AutoTextarea value={x.instructions} onChange={(v) => update(x.id, { instructions: v })} placeholder="Collab handle, spark code, whitelisting, tags…" /></div>
          <div><Label text="Notes" /><AutoTextarea value={x.notes} onChange={(v) => update(x.id, { notes: v })} placeholder="Feedback rounds, contacts, anything else…" /></div>
          <button onClick={() => remove(x.id)} className="self-end flex items-center gap-1" style={{ ...iconBtn, fontSize: 12, color: C.rose }}><Trash2 size={12} /> Remove deal</button>
        </div>
      )}
    </div>
  );
}

function ClientCard({ c, updateClient, removeClient }) {
  return (
    <div className="rounded-2xl p-4" style={{ ...card, borderRadius: 16, borderLeft: `3px solid ${CLIENT_TINT[c.status]}` }}>
      <div className="flex items-center gap-2"><div className="flex-1 min-w-0"><InlineEdit value={c.name} onChange={(v) => updateClient(c.id, { name: v })} strong /></div><button onClick={() => removeClient(c.id)} style={iconBtn} aria-label="Delete"><Trash2 size={13} /></button></div>

      ))}</div>

function DealsModule({ data, setData, q }) {
  const [openId, setOpenId] = useState(null);
  const deals = data.deals.deals, clients = data.deals.clients;
  const ql = (q || "").toLowerCase();
  const patch = (p) => setData((d) => ({ ...d, deals: { ...d.deals, ...p } }));
  const update = (id, p) => patch({ deals: deals.map((x) => (x.id === id ? { ...x, ...p } : x)) });
  const remove = (id) => patch({ deals: deals.filter((x) => x.id !== id) });
  const add = (type) => { const x = { id: uid(), brand: "New brand", deliverable: "", stage: "Brief", due: "", rate: "", caption: "", instructions: "", notes: "", aura: Math.floor(Math.random() * AURAS.length), priority: "Medium", lastProgress: null, created: todayISO(), type: type || "Prospect", tasks: [] }; patch({ deals: [x, ...deals] }); setOpenId(x.id); };
  const updateClient = (id, p) => patch({ clients: clients.map((c) => (c.id === id ? { ...c, ...p } : c)) });
  const addClient = () => patch({ clients: [{ id: uid(), name: "New client", service: "", status: "Lead", notes: "", tasks: [] }, ...clients] });
  const removeClient = (id) => patch({ clients: clients.filter((c) => c.id !== id) });

  const matchDeal = (x) => !ql || x.brand.toLowerCase().includes(ql) || (x.deliverable || "").toLowerCase().includes(ql);
  const matchClient = (c) => !ql || c.name.toLowerCase().includes(ql) || (c.service || "").toLowerCase().includes(ql);

  const activeDeals = deals.filter((x) => (x.type || "Active") === "Active" && matchDeal(x))
    .sort((a, b) => { const ap = a.stage === "Posted", bp = b.stage === "Posted"; if (ap !== bp) return ap ? 1 : -1; if (a.due && b.due) return a.due.localeCompare(b.due); return a.due ? -1 : b.due ? 1 : 0; });
  const prospectDeals = deals.filter((x) => (x.type || "Active") === "Prospect" && matchDeal(x));
  const activeClients = clients.filter((c) => c.status !== "Lead" && matchClient(c));
  const prospectClients = clients.filter((c) => c.status === "Lead" && matchClient(c));

  const stageBars = DEAL_STAGES.slice(0, 6).map((s, i) => ({ label: s.split(" ")[0], value: activeDeals.filter((d) => d.stage === s).length, color: AURAS[i % AURAS.length] }));

  return (
    <section>
      <SectionHead title="Brand deals" sub="Split into active (confirmed, in motion) and prospective (still in discussion). Every deal and task here feeds the Priorities dashboard." action={<AddBtn onClick={() => add("Prospect")} label="Add deal" />} />
      {activeDeals.length > 0 && (
        <div className="rounded-2xl p-4 mb-5" style={{ ...card, borderRadius: 18 }}>

              <span>{emoji}</span><span>{label}</span><span style={{ fontSize: 11, background: on ? "rgba(11,11,13,0.15)" : FILL2, color: on ? C.canvas : MUT, borderRadius: 99, padding: "1px 7px" }}>{count}</span>

function Creators({ data, setData, q }) {

  const remove = (id) => setData((d) => ({ ...d, creators: d.creators.filter((c) => c.id !== id) }));
  const add = () => { const c = { id: uid(), name: "New creator", niche: "", goals: [], aura: Math.floor(Math.random() * AURAS.length), links: [], notes: [], tasks: [] }; setData((d) => ({ ...d, creators: [c, ...d.creators] })); setOpenId(c.id); };

    <section>
      <SectionHead title="Creator roster" sub="Everything you know per creator: their goal, your research, the links that matter." action={<AddBtn onClick={add} label="Add creator" />} />

}

        <div className="flex items-center justify-between"><div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: MUT }}>Goal{c.goals.length > 1 ? "s" : ""}</div><button onClick={() => onUpdate({ goals: [...c.goals, { id: uid(), text: "" }] })} style={{ ...iconBtn, color: aura, fontSize: 11, display: "flex", alignItems: "center", gap: 3 }}><Plus size={11} /> Add goal</button></div>
        {c.goals.length === 0 && <div style={{ fontSize: 13, color: FAINT }}>What are they trying to achieve?</div>}

      <div className="mt-3">

      {open && (

          <div>
            <Label text="Research log" />
            <div className="flex gap-2"><input value={noteDraft} onChange={(e) => setNoteDraft(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addNote()} placeholder="Add a research note, insight, or idea…" className="flex-1 rounded-lg px-3 py-2" style={inputStyle} /><button onClick={addNote} style={pillAccent(aura)}>Add</button></div>
            <div className="mt-2 flex flex-col gap-2" style={{ maxHeight: 220, overflowY: "auto" }}>{c.notes.map((n) => (<div key={n.id} className="rounded-lg px-3 py-2 flex items-start gap-2" style={{ ...cardSoft, borderRadius: 10 }}><div className="flex-1" style={{ fontSize: 13, lineHeight: 1.45 }}>{n.text}<span style={{ fontSize: 10.5, color: FAINT, marginLeft: 8 }}>{n.date}</span></div><button onClick={() => onUpdate({ notes: c.notes.filter((x) => x.id !== n.id) })} style={iconBtn} aria-label="Delete note"><X size={11} /></button></div>))}</div>
          </div>
          <div>
            <Label text="Links" />
            <div className="flex gap-2 flex-wrap mb-2">{c.links.map((l) => (<span key={l.id} className="rounded-full px-3 py-1 flex items-center gap-1.5" style={{ ...cardSoft, borderRadius: 99, fontSize: 12 }}><a href={l.url} target="_blank" rel="noreferrer" style={{ color: C.sky, textDecoration: "none", display: "flex", alignItems: "center", gap: 4 }}><ExternalLink size={11} />{l.label}</a><button onClick={() => onUpdate({ links: c.links.filter((x) => x.id !== l.id) })} style={{ ...iconBtn, padding: 0 }} aria-label="Remove link"><X size={11} /></button></span>))}</div>

function Tasks({ data, setData }) {
  const [title, setTitle] = useState(""); const [source, setSource] = useState("Discord"); const [link, setLink] = useState(""); const [creatorId, setCreatorId] = useState("");
  const add = () => { const t = title.trim(); if (!t) return; setData((d) => ({ ...d, tasks: [{ id: uid(), title: t, source, link: link.trim(), creatorId: creatorId || null, status: "To do", created: new Date().toISOString().slice(0, 10), due: null, priority: "Medium", lastProgress: null }, ...d.tasks] })); setTitle(""); setLink(""); };
  const advance = (id) => setData((d) => ({ ...d, tasks: d.tasks.map((t) => t.id === id ? { ...t, status: TASK_COLS[Math.min(TASK_COLS.indexOf(t.status) + 1, 2)] } : t) }));
  const back = (id) => setData((d) => ({ ...d, tasks: d.tasks.map((t) => t.id === id ? { ...t, status: TASK_COLS[Math.max(TASK_COLS.indexOf(t.status) - 1, 0)] } : t) }));
  const update = (id, p) => setData((d) => ({ ...d, tasks: d.tasks.map((t) => (t.id === id ? { ...t, ...p } : t)) }));
  const remove = (id) => setData((d) => ({ ...d, tasks: d.tasks.filter((t) => t.id !== id) }));
  const clearDone = () => setData((d) => ({ ...d, tasks: d.tasks.filter((t) => t.status !== "Done") }));
  const creatorById = Object.fromEntries(data.creators.map((c) => [c.id, c]));
  const bars = SOURCES.map((s) => ({ label: s.slice(0, 4), value: data.tasks.filter((t) => t.source === s && t.status !== "Done").length, color: SOURCE_TINT[s] }));
  return (
    <section>
      <SectionHead title="Task capture" sub="One place for the strays: Discord pings, Basecamp tags, email asks. Tap a card to move it forward." />
      {data.tasks.some((t) => t.status !== "Done") && (
        <div className="rounded-2xl p-4 mb-5" style={{ ...card, borderRadius: 18 }}><div style={{ fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", color: MUT, marginBottom: 6 }}>Open tasks by source 📥</div><Bars data={bars} height={110} /></div>
      )}
      <div className="rounded-2xl p-4 mb-6" style={{ ...card, borderRadius: 16 }}>
        <div className="flex gap-2 flex-wrap mb-3">{SOURCES.map((s) => (<button key={s} onClick={() => setSource(s)} className="rounded-full px-3 py-1" style={{ fontSize: 12, cursor: "pointer", fontFamily: "inherit", background: source === s ? `${SOURCE_TINT[s]}22` : FILL, border: `1px solid ${source === s ? SOURCE_TINT[s] : LINE}`, color: source === s ? SOURCE_TINT[s] : MUT }}>{s}</button>))}</div>
        <div className="flex gap-2 flex-wrap">
          <input value={title} onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder={`What came in via ${source}?`} className="flex-1 rounded-lg px-3 py-2" style={{ ...inputStyle, minWidth: 200 }} />
          <input value={link} onChange={(e) => setLink(e.target.value)} placeholder="Link (optional)" className="rounded-lg px-3 py-2" style={{ ...inputStyle, width: 160 }} />
          <select value={creatorId} onChange={(e) => setCreatorId(e.target.value)} className="rounded-lg px-3 py-2" style={{ ...inputStyle, width: 150, color: creatorId ? C.ink : FAINT }}><option value="">No creator</option>{data.creators.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
          <button onClick={add} style={pillDark}><Plus size={14} style={{ display: "inline", marginRight: 4 }} />Capture</button>
        </div>
      </div>
      <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))" }}>
        {TASK_COLS.map((col) => {
          const items = data.tasks.filter((t) => t.status === col);
          return (
            <div key={col} className="rounded-2xl p-3" style={{ ...cardSoft, borderRadius: 16 }}>

              <div className="flex flex-col gap-2">
                {items.map((t) => { const tint = SOURCE_TINT[t.source] || C.lilac; const cr = t.creatorId ? creatorById[t.creatorId] : null; return (
                  <div key={t.id} className="rounded-xl p-3" style={{ ...card, borderRadius: 12, borderLeft: `2px solid ${tint}` }}>
                    <div style={{ fontSize: 13.5, lineHeight: 1.4, textDecoration: col === "Done" ? "line-through" : "none", opacity: col === "Done" ? 0.55 : 1 }}>{t.title}</div>
                    <div className="flex items-center gap-2 mt-2 flex-wrap" style={{ fontSize: 11, color: MUT }}><span style={{ color: tint }}>{t.source}</span>{cr && <span>· {cr.name}</span>}{t.link && <a href={t.link.startsWith("http") ? t.link : `https://${t.link}`} target="_blank" rel="noreferrer" style={{ color: C.sky }}><ExternalLink size={11} /></a>}<span className="ml-auto flex gap-1">{col !== "To do" && <button onClick={() => back(t.id)} style={iconBtn} aria-label="Back">←</button>}{col !== "Done" && <button onClick={() => advance(t.id)} style={{ ...iconBtn, color: C.mint }} aria-label="Forward">→</button>}<button onClick={() => remove(t.id)} style={iconBtn} aria-label="Delete"><X size={12} /></button></span></div>
                    {col !== "Done" && <PriorityControls item={t} onChange={(p) => update(t.id, p)} />}
                  </div>
                ); })}
                {items.length === 0 && <div className="rounded-xl p-3 text-center" style={{ border: `1px dashed ${LINE}`, fontSize: 12, color: FAINT, borderRadius: 12 }}>Empty</div>}
              </div>
            </div>
          );
        })}
      </div>
      {data.tasks.some((t) => t.status === "Done") && <button onClick={clearDone} className="mt-4" style={{ ...iconBtn, fontSize: 12 }}>Clear done tasks</button>}
    </section>
  );
}

function Reports({ data, setData }) {
  const mk = monthKey();
  const doneCount = data.reports.filter((r) => r.done.includes(mk)).length, total = data.reports.length, pct = total ? doneCount / total : 0;
  const toggle = (id) => setData((d) => ({ ...d, reports: d.reports.map((r) => r.id === id ? { ...r, done: r.done.includes(mk) ? r.done.filter((m) => m !== mk) : [...r.done, mk] } : r) }));
  const update = (id, patch) => setData((d) => ({ ...d, reports: d.reports.map((r) => (r.id === id ? { ...r, ...patch } : r)) }));
  const add = () => setData((d) => ({ ...d, reports: [...d.reports, { id: uid(), name: "New recurring report", dueDay: 28, done: [], tasks: [] }] }));
  const remove = (id) => setData((d) => ({ ...d, reports: d.reports.filter((r) => r.id !== id) }));
  const today = new Date().getDate();
  return (
    <section>
      <SectionHead title="Recurring reports" sub={`Your ${monthName()} cycle. The ring closes as reports go out.`} action={<AddBtn onClick={add} label="Add report" />} />
      <div className="flex gap-5 flex-wrap items-start">
        <div className="rounded-2xl p-6 flex flex-col items-center" style={{ ...card, borderRadius: 18, minWidth: 170 }}>
          <Ring pct={pct} tint={C.lilac} size={110} thick={11} label={`${doneCount}/${total}`} sub={monthName().slice(0, 3).toUpperCase()} />
        </div>
        <div className="flex-1 flex flex-col gap-3" style={{ minWidth: 280 }}>
          {data.reports.map((r) => { const done = r.done.includes(mk); const overdue = !done && today > r.dueDay; return (
            <div key={r.id} className="rounded-2xl p-4" style={{ ...card, borderRadius: 16, borderLeft: `3px solid ${done ? C.mint : overdue ? C.rose : C.amber}` }}>
              <div className="flex items-center gap-3 flex-wrap">
                <button onClick={() => toggle(r.id)} aria-label="Toggle done" style={{ width: 26, height: 26, borderRadius: 9, cursor: "pointer", flexShrink: 0, background: done ? C.mint : C.card, border: `1px solid ${done ? C.mint : LINE}`, display: "flex", alignItems: "center", justifyContent: "center" }}>{done && <Check size={15} color="#fff" strokeWidth={3} />}</button>
                <div className="flex-1 min-w-0"><InlineEdit value={r.name} onChange={(v) => update(r.id, { name: v })} strong /><div style={{ fontSize: 12, color: overdue ? C.rose : MUT }}>Due day <input type="number" min="1" max="31" value={r.dueDay} onChange={(e) => update(r.id, { dueDay: Math.min(31, Math.max(1, Number(e.target.value) || 1)) })} style={{ ...inputStyle, width: 50, padding: "1px 6px", borderRadius: 6, fontSize: 12, display: "inline-block" }} /> each month{overdue && " · overdue"}{done && ` · done`}</div></div>
                <button onClick={() => remove(r.id)} style={iconBtn} aria-label="Delete"><Trash2 size={13} /></button>
              </div>
              <div className="mt-3"><Label text="Tasks" /><MiniTaskList tasks={r.tasks} onChange={(tasks) => update(r.id, { tasks })} /></div>
            </div>
          ); })}
          {total === 0 && <Empty text="No recurring reports set up." />}
        </div>
      </div>
    </section>
  );
}

const darkInput = { background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.14)", color: "#fff", fontSize: 13.5, fontFamily: "'Outfit', sans-serif" };
const iconBtn = { background: "transparent", border: "none", color: MUT, cursor: "pointer", padding: 4, borderRadius: 6, fontFamily: "'Outfit', sans-serif" };
const pillDark = { background: "#F2F2F4", color: "#0B0B0D", border: "none", fontWeight: 600, fontSize: 13, borderRadius: 99, padding: "8px 16px", cursor: "pointer", fontFamily: "'Outfit', sans-serif" };
const pillGhost = { background: "transparent", color: C.ink, border: `1px solid ${LINE}`, fontWeight: 500, fontSize: 13, borderRadius: 99, padding: "8px 16px", cursor: "pointer", fontFamily: "'Outfit', sans-serif" };
const pillAccent = (tint) => ({ background: tint, color: onTint(tint), border: "none", fontWeight: 600, fontSize: 13, borderRadius: 10, padding: "8px 16px", cursor: "pointer", fontFamily: "'Outfit', sans-serif" });

function SectionHead({ title, sub, action }) {
  return (
    <div className="flex items-end justify-between gap-3 mb-4 flex-wrap">
      <div><h2 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 27, margin: 0, letterSpacing: "-0.01em" }}>{title}</h2><p style={{ fontSize: 13.5, color: MUT, margin: "5px 0 0", maxWidth: 620 }}>{sub}</p></div>
      {action}
    </div>
  );
}
function AddBtn({ onClick, label }) { return <button onClick={onClick} className="flex items-center gap-1.5" style={pillDark}><Plus size={14} />{label}</button>; }
function Label({ text }) { return <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: MUT, marginBottom: 5 }}>{text}</div>; }
function Empty({ text }) { return <div className="rounded-2xl p-8 text-center mt-2" style={{ border: `1px dashed ${LINE}`, color: MUT, fontSize: 13, borderRadius: 16 }}><Sparkles size={16} style={{ display: "inline", marginBottom: 6, color: FAINT }} /><br />{text}</div>; }
function InlineEdit({ value, onChange, placeholder, strong, dim }) {
  return <input value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder || ""} className="w-full" style={{ background: "transparent", border: "1px solid transparent", borderRadius: 6, padding: "2px 4px", margin: "-2px -4px", color: dim ? MUT : C.ink, fontSize: strong ? 15 : 13, fontWeight: strong ? 600 : 400, fontFamily: "'Outfit', sans-serif" }} onFocus={(e) => (e.target.style.border = `1px solid ${C.lilac}`)} onBlur={(e) => (e.target.style.border = "1px solid transparent")} />;
}
function AutoTextarea({ value, onChange, placeholder }) { return <textarea value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} rows={2} className="w-full rounded-lg px-3 py-2 resize-none" style={{ ...inputStyle, lineHeight: 1.45 }} />; }

ReactDOM.createRoot(document.getElementById("root")).render(<AllyCRM />);
</script>
</body>
</html>
