    if (typeof window !== "undefined" && window.storage && window.storage.set) {
      try { await window.storage.set(k, v, false); return; } catch (e) {}
    }
    try { localStorage.setItem(k, v); } catch (e) {}

};

/* ---------- priority engine: shared urgency scoring across all 5 pillars ---------- */
const PRIORITY_LEVELS = ["Low", "Medium", "High"];
const PRIORITY_WEIGHT = { Low: 1, Medium: 2, High: 3 };
const PRIORITY_TINT = { Low: C.sky, Medium: C.amber, High: C.rose };

/* single source of truth for "how urgent is this due date" — one set of day bands, reused
   everywhere so the Urgent/Medium/Low bucket, the auto-escalation to High priority, and the
   dashboard ring's fill weight can never disagree with each other:
     - due today or overdue   -> guarantees Urgent (the ring separately treats overdue as an even
       worse "LATE/critical" state, but there's no bucket above Urgent for the discrete columns)
     - due in 1-2 days        -> guarantees Urgent, regardless of what priority label is set
     - due in 3-5 days        -> guarantees at least Medium, regardless of priority
     - due in 6+ days (or no due date at all) -> the calendar stops forcing anything; priority
       and stalled-progress alone decide the bucket, same as always
   The due-date signal DOMINATES rather than stacking with priority (max, not addition) — a
   deadline is pass/fail, so priority can only push urgency up from there, never override a close
   deadline down. */
function dueBandScore(daysUntilDue) {
  if (daysUntilDue === null || daysUntilDue === undefined) return 0;
  if (daysUntilDue <= 2) return 4.2; // today, overdue, or due within 1-2 days
  if (daysUntilDue <= 5) return 2.2; // due in 3-5 days
  return 0; // 6+ days out: no calendar override, priority/stall decide
}

/* how hard silence pushes urgency up: no logged progress, scaled to how much runway is left */
function stallUrgency(daysSinceProgress, daysUntilDue) {
  if (daysSinceProgress === null) return 0;
  const runway = daysUntilDue === null ? 14 : Math.max(daysUntilDue + daysSinceProgress, 1);
  const ratio = daysSinceProgress / runway;
  if (ratio >= 0.66) return 1.2;
  if (ratio >= 0.4) return 0.6;
  return 0;
}

/* score + bucket for one item shaped like { due, priority, lastProgress, created } */
function computeUrgency(item) {
  const base = PRIORITY_WEIGHT[item.priority] || PRIORITY_WEIGHT.Medium;
  const dUntil = item.due ? daysUntil(item.due) : null;
  const touch = item.lastProgress || item.created || null;
  const dSince = touch ? daysSince(touch) : null;
  const score = Math.max(base, dueBandScore(dUntil)) + stallUrgency(dSince, dUntil);
  const bucket = score >= 4.2 ? "Urgent" : score >= 2.2 ? "Medium" : "Low";
  return { score: Math.round(score * 10) / 10, bucket, daysUntilDue: dUntil, daysSinceProgress: dSince };
}

/* content doesn't get per-item due dates/priority — the whole pillar's urgency is one master
   signal, and it's driven entirely by days since your last post, full stop. It does not care what's
   sitting in the pipeline (Scripted/Filmed/Edited are for your own tracking only) and it does not
   care about a posting-cadence target — 1 day since post = 20% full, 5 days = 100%, and it keeps
   climbing past that into an overflow/critical state if you let it run. Every open content piece
   inherits this same score/bucket, so individual ideas never compete with each other on "urgency". */
function computeContentUrgency(content) {
  const since = daysSince(content.lastPosted);
  const pct = since === null ? 40 : since * 20;
  const bucket = pct > 80 ? "Urgent" : pct >= 40 ? "Medium" : "Low";
  const score = Math.round((1 + (Math.min(pct, 100) / 100) * 5) * 10) / 10;
  return { score, bucket, pct, since };
}

/* pulls every outstanding item from all 5 pillars into one flat, scored list.
   unlocks pulls from two sources: Discovery ecosystem benefits currently "in progress",
   and the linear chain steps (apartment / car ownership) currently "active". */
function collectPriorityTasks(ally, mama) {
  const out = [];
  {
    const cu = computeContentUrgency(ally.content);
    ally.content.items.forEach((i) => out.push({
      id: i.id, pillar: "content", title: i.title, due: null, lastProgress: null, created: i.created || null,
      score: cu.score, bucket: cu.bucket, daysUntilDue: null, daysSinceProgress: null, _preScored: true,
    }));
  }
  {
    const songCurrentIdx = ally.song.stages.findIndex((s) => s.status !== "done");
    if (songCurrentIdx !== -1) {
      const s = ally.song.stages[songCurrentIdx];
      if (!s.paused) out.push({
        id: s.id, pillar: "song", title: s.name, due: s.due || null,
        priority: s.priority || "Medium", lastProgress: s.lastProgress || null, created: s.created || null,
      });
    }
  }
  ((ally.unlocks.ecosystem && ally.unlocks.ecosystem.pillars) || []).flatMap((p) => p.benefits).filter((b) => b.state === "progress" && !b.paused).forEach((b) => out.push({
    id: b.id, pillar: "unlocks", title: b.label, due: b.due || null,
    priority: b.priority || "Medium", lastProgress: b.lastProgress || null, created: b.created || null,
  }));
  (ally.unlocks.chains || []).forEach((ch) => ch.nodes.filter((n) => n.status === "active" && !n.paused).forEach((n) => out.push({
    id: n.id, pillar: "unlocks", title: n.label, due: n.due || null,
    priority: n.priority || "Medium", lastProgress: n.lastProgress || null, created: n.created || null,
  })));
  ally.deals.deals.filter((d) => d.stage !== "Posted" && !d.paused).forEach((d) => out.push({
    id: d.id, pillar: "deals", title: d.brand, due: d.due || null,
    priority: d.priority || "Medium", lastProgress: d.lastProgress || null, created: d.created || null,
  }));
  ally.deals.deals.forEach((d) => (d.tasks || []).filter((t) => !t.done && !t.paused).forEach((t) => out.push({
    id: t.id, pillar: "deals", title: `${t.title} (${d.brand})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  ally.deals.clients.forEach((c) => (c.tasks || []).filter((t) => !t.done && !t.paused).forEach((t) => out.push({
    id: t.id, pillar: "deals", title: `${t.title} (${c.name})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  mama.tasks.filter((t) => t.status !== "Done" && !t.paused).forEach((t) => out.push({
    id: t.id, pillar: "mama", title: t.title, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  }));
  (mama.creators || []).forEach((cr) => (cr.tasks || []).filter((t) => !t.done && !t.paused).forEach((t) => out.push({
    id: t.id, pillar: "mama", title: `${t.title} (${cr.name})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  (mama.tools || []).forEach((tl) => (tl.tasks || []).filter((t) => !t.done && !t.paused).forEach((t) => out.push({
    id: t.id, pillar: "mama", title: `${t.title} (${tl.name})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  (mama.reports || []).forEach((rp) => (rp.tasks || []).filter((t) => !t.done && !t.paused).forEach((t) => out.push({
    id: t.id, pillar: "mama", title: `${t.title} (${rp.name || rp.title})`, due: t.due || null,
    priority: t.priority || "Medium", lastProgress: t.lastProgress || null, created: t.created || null,
  })));
  return out.map((t) => (t._preScored ? t : { ...t, ...computeUrgency(t) }));
}

/* every pillar gets its own independent fill ring now — no more competing for a shared 100%.
   Same color banding everywhere so the colors mean the same thing on every card: 0-19% calm (blue),
   20-40% fine (green), 41-80% building up (orange), 81-100%+ needs you today (red). Past 100% is a
   critical/overflow state — the ring caps visually at a full loop but the number keeps climbing. */
function urgencyTint(pct) {
  if (pct >= 81) return C.rose;
  if (pct >= 41) return C.amber;
  if (pct >= 20) return C.mint;
  return C.sky;
}

/* non-content pillars: each task contributes its own fill % — whichever is bigger of two signals:
   (a) its priority label alone (High 20% / Medium 10% / Low 5%, the ambient weight when there's no
   hard date to hook onto), or (b) how close its due date actually is, which dominates once a
   deadline is real. Same day bands as the Urgent/Medium/Low bucket used everywhere else (dueBandScore
   above), so the two systems always agree: due today or overdue is the critical "LATE zone" (100%+,
   climbing the longer it's late), due in 1-2 days is the Urgent band (50%), due in 3-5 days is the
   Medium band (25%), and 6+ days out the calendar stops forcing anything — same as computeUrgency,
   priority alone decides from there. Contributions sum across every open task, uncapped, so a pillar
   that's actually overloaded (several close deadlines at once) reads well past 100% rather than
   getting capped and looking falsely under control. */
const PRIORITY_BASE_PCT = { Low: 5, Medium: 10, High: 20 };
function taskFillPercent(t) {
  const base = PRIORITY_BASE_PCT[t.priority] || PRIORITY_BASE_PCT.Medium;
  const d = t.daysUntilDue;
  let dueTerm = 0;
  if (d !== null && d !== undefined) {
    if (d < 0) dueTerm = 100 + (-d) * 25; // overdue: LATE zone, escalates further every extra day
    else if (d === 0) dueTerm = 100;      // due today: needs to be the day's whole focus
    else if (d <= 2) dueTerm = 50;        // due in 1-2 days: Urgent band
    else if (d <= 5) dueTerm = 25;        // due in 3-5 days: Medium band
    else dueTerm = 0;                     // due 6+ days out: no override, priority alone decides
  }
  return Math.max(base, dueTerm);
}
function computePillarFillPercent(tasks) {
  return tasks.reduce((s, t) => s + taskFillPercent(t), 0);
}

/* ================= CHARTS ================= */
function Ring({ pct, tint, size = 66, thick = 8, label, sub }) {
  const r = (size - thick) / 2, c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label={label ? `${label} ${sub || ""}` : `${Math.round(pct * 100)} percent`} style={{ flexShrink: 0 }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(28,28,34,0.08)" strokeWidth={thick} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={tint} strokeWidth={thick} strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c * (1 - Math.min(1, pct))} transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset 0.6s ease" }} />
      {label !== undefined && <text x={size / 2} y={size / 2 + 1} textAnchor="middle" fill={C.ink} style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: size * 0.24, fontWeight: 700 }}>{label}</text>}
      {sub && <text x={size / 2} y={size / 2 + size * 0.2} textAnchor="middle" fill={MUT} style={{ fontSize: size * 0.11, letterSpacing: "0.06em" }}>{sub}</text>}
    </svg>
  );
}

function Donut({ segments, size = 150, thick = 20, centerTop, centerSub }) {
  const r = (size - thick) / 2, c = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  let off = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label="distribution donut chart">
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(28,28,34,0.06)" strokeWidth={thick} />
      {segments.map((seg, i) => {
        const frac = seg.value / total, dash = frac * c;
        const el = <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={seg.color} strokeWidth={thick}
          strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={-off} transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dasharray 0.5s ease" }} />;
        off += dash; return el;
      })}
      {centerTop !== undefined && <text x={size / 2} y={size / 2 - 2} textAnchor="middle" fill={C.ink} style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: size * 0.2, fontWeight: 700 }}>{centerTop}</text>}
      {centerSub && <text x={size / 2} y={size / 2 + size * 0.13} textAnchor="middle" fill={MUT} style={{ fontSize: size * 0.075, letterSpacing: "0.08em", textTransform: "uppercase" }}>{centerSub}</text>}
    </svg>
  );
}

function Bars({ data, height = 130 }) {

      const rm = await store.get(MAMA_KEY); if (rm) { try { m = JSON.parse(rm); } catch (e) {} }

      setAlly(a); setMama(m); loaded.current = true; setLocalLoaded(true);
    })();
  }, []);

  /* ---------- cloud sync: Google Sign-In + Firestore (purely additive on top of localStorage) ---------- */
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false); // becomes true once we've heard back from Firebase at least once
  const [cloudState, setCloudState] = useState("offline"); // offline | loading | saving | synced | error
  const cloudLoadedFor = useRef(null); // uid a reconcile is/was in flight for
  const reconcileDone = useRef(false); // true only once that reconcile has FULLY resolved (fixes a
    // real race: signing in on a new device used to let the ongoing-save effect below fire in the
    // same tick as the pull-or-seed effect, writing this device's stale local data to Firestore
    // before the pull had a chance to land — a slow network made the stale write win, clobbering
    // the good cloud copy. Gating on a ref that only flips true after the reconcile's try/finally
    // fully completes closes that window.
  const allyRef = useRef(ally); allyRef.current = ally;
  const mamaRef = useRef(mama); mamaRef.current = mama;
  const cloudTimer = useRef(null);

  useEffect(() => {
    if (!fbAuth) { setAuthReady(true); return; }
    const unsub = fbAuth.onAuthStateChanged((u) => { setUser(u); setAuthReady(true); });
    return unsub;
  }, []);

  const signInGoogle = async () => {
    if (!fbAuth) return;
    try { await fbAuth.signInWithPopup(new window.firebase.auth.GoogleAuthProvider()); }
    catch (e) { /* popup closed/blocked — nothing to surface, user can just try again */ }
  };
  const signOutGoogle = async () => {
    if (!fbAuth) return;
    try { await fbAuth.signOut(); } catch (e) {}
    cloudLoadedFor.current = null; reconcileDone.current = false; setCloudState("offline"); setUser(null);
  };

  /* one-time cleanup helper: wipes this browser's local cache of ally/mama data. Only ever used
     from the signed-out gate screen below, as a manual "tidy up the stale copy" action — Firestore
     is untouched, and the app reloads clean right after (nothing to display, since we're signed out). */
  const clearLocalCache = () => {
    if (!window.confirm("This clears the copy of your data saved in this browser only. Your Google account's cloud copy in Firestore is not touched. Continue?")) return;
    try { localStorage.removeItem(ALLY_KEY); localStorage.removeItem(MAMA_KEY); } catch (e) {}
    window.location.reload();
  };

  /* one-time reconcile the moment we know who's signed in AND local data has finished loading:
     if Firestore already has a saved doc for this uid, that becomes the live state (so a second
     device picks up everything); otherwise this device's current data becomes the seed. */
  useEffect(() => {
    if (!fbDb || !user || !localLoaded) return;
    if (cloudLoadedFor.current === user.uid) return;
    cloudLoadedFor.current = user.uid;
    reconcileDone.current = false;
    (async () => {
      setCloudState("loading");
      try {
        const docRef = fbDb.collection("users").doc(user.uid);
        const snap = await docRef.get();
        const remote = snap.exists ? snap.data() : null;
        if (remote && remote.ally && remote.mama) {
          setAlly(remote.ally); setMama(remote.mama);
        } else {
          await docRef.set({ ally: allyRef.current, mama: mamaRef.current, updatedAt: Date.now() });
        }
        setCloudState("synced");
      } catch (e) {
        setCloudState("error");
      } finally {
        reconcileDone.current = true;
      }
    })();
  }, [user, localLoaded]);

  /* ongoing sync: same debounce shape as the localStorage save below, just a bit longer since
     it's a network write, and only once the initial reconcile above has actually happened. */
  useEffect(() => {
    if (!fbDb || !user || !reconcileDone.current) return;
    setCloudState("saving"); clearTimeout(cloudTimer.current);
    cloudTimer.current = setTimeout(async () => {
      try {
        await fbDb.collection("users").doc(user.uid).set({ ally, mama, updatedAt: Date.now() });
        setCloudState("synced");
      } catch (e) { setCloudState("error"); }
    }, 600);
    return () => clearTimeout(cloudTimer.current);
  }, [ally, mama, user]);

  const useSave = (key, data) => {
    useEffect(() => {
      if (!loaded.current || !data) return;
      setSaveState("saving"); clearTimeout(timers.current[key]);

        try { await store.set(key, JSON.stringify(data)); setSaveState("saved"); setTimeout(() => setSaveState("idle"), 1400); } catch (e) { setSaveState("error"); }
      }, 250);

  useSave(ALLY_KEY, ally);
  useSave(MAMA_KEY, mama);

  /* safety net: any edit (priority, status, whatever) must survive a fast tab-switch or refresh,
     so flush straight to localStorage the instant the tab is hidden/closed, bypassing the debounce. */
  useEffect(() => {
    const flush = () => {
      if (!loaded.current) return;
      try { if (ally) localStorage.setItem(ALLY_KEY, JSON.stringify(ally)); } catch (e) {}
      try { if (mama) localStorage.setItem(MAMA_KEY, JSON.stringify(mama)); } catch (e) {}
    };
    const onVis = () => { if (document.visibilityState === "hidden") flush(); };
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("pagehide", flush);
    window.addEventListener("beforeunload", flush);
    return () => {
      document.removeEventListener("visibilitychange", onVis);
      window.removeEventListener("pagehide", flush);
      window.removeEventListener("beforeunload", flush);
    };
  }, [ally, mama]);

  const go = (next) => { if (next === tab) return; setHistory((h) => [...h, tab].slice(-20)); setTab(next); setQ(""); };
  const back = () => { setHistory((h) => { if (!h.length) return h; const prev = h[h.length - 1]; setTab(prev); setQ(""); return h.slice(0, -1); }); };

              inner wrapper uses vertical auto-margins: short pages center in the available space

              since auto-margins collapse to 0 once content is taller than the viewport. */}
          <div className="scroll" style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "28px 36px", display: "flex", flexDirection: "column", alignItems: "center" }}>

              {tab === "overview" && <PriorityDashboard ally={ally} mama={mama} go={go} setAlly={setAlly} setMama={setMama} />}
              {tab === "content" && <ContentModule data={ally} setData={setAlly} q={q} />}
              {tab === "song" && <SongModule data={ally} setData={setAlly} />}
              {tab === "unlocks" && <UnlocksModule data={ally} setData={setAlly} />}
              {tab === "apartment" && <ApartmentModule data={ally} setData={setAlly} unlocked={aptUnlocked} go={go} q={q} />}
